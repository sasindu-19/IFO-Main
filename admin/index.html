<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - IFO</title>
  <link rel="icon" type="image/jpeg" href="/assets/img/logo.jpg" />
  <link rel="stylesheet" href="../assets/css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="container" style="max-width: 400px; margin-top: 100px;">
    <div class="card">
      <div class="card-header">
        <h2>Admin Login</h2>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="EMAIL ADDRESS">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••">
        </div>
      </div>
      <div id="errorMessage"
        style="display: none; color: #d9534f; background-color: #fdf7f7; border: 1px solid #d9534f; padding: 10px; margin: 0 20px 15px; border-radius: 4px; font-size: 14px; text-align: center;">
      </div>
      <div class="modal-footer">
        <button id="loginBtn" class="btn btn-primary"
          style="width: 100%; display: block; text-align: center; text-decoration: none; border: none; cursor: pointer; padding: 10px;">Login</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/supabase.js"></script>
  <script>
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMessage');

      errorDiv.style.display = 'none';

      if (!email || !password) {
        errorDiv.innerText = 'Please enter both email and password.';
        errorDiv.style.display = 'block';
        return;
      }

      const btn = document.getElementById('loginBtn');
      const originalText = btn.innerText;
      btn.innerText = 'Logging in...';
      btn.disabled = true;
      btn.style.opacity = '0.7';

      const { data, error } = await window.supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      btn.innerText = originalText;
      btn.disabled = false;
      btn.style.opacity = '1';

      if (error) {
        console.error('Error logging in:', error.message);
        errorDiv.innerText = 'Invalid email or password.';
        errorDiv.style.display = 'block';
        return;
      }

      if (data && data.user) {
        // Success
        localStorage.setItem('adminLoggedIn', 'true');
        localStorage.setItem('adminEmail', data.user.email);
        window.location.href = '/admin/dashboard.html';
      }
    });
  </script>
</body>

</html>
